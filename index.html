<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Python Lander Game</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- Level Select Menu -->
    <div id="levelSelectOverlay">
      <div id="levelSelectContainer">
        <h1 id="gameTitle">lander game</h1>
        <div id="levelList">
          <!-- Levels will be dynamically inserted here -->
        </div>
      </div>
    </div>

    <!-- Tutorial Overlay -->
    <div id="tutorialOverlay" style="display: none;">
      <div id="tutorialContainer">
        <div id="tutorialHeader">
          <h2>📚 Tutorials</h2>
          <button id="closeTutorial">✕</button>
        </div>
        <div id="tutorialList">
          <!-- Tutorials will be dynamically inserted here -->
        </div>
      </div>
    </div>

    <!-- Tutorial Content Viewer -->
    <div id="tutorialViewer" style="display: none;">
      <div id="tutorialViewerContainer">
        <div id="tutorialViewerHeader">
          <button id="backToTutorials">← Back</button>
          <h2 id="tutorialTitle"></h2>
          <button id="closeTutorialViewer">✕</button>
        </div>
        <div id="tutorialContent"></div>
      </div>
    </div>

    <!-- Failure Overlay -->
    <div id="failureOverlay">
      <div id="failureContainer">
        <h1 id="failureTitle">CRASH!</h1>
        <p id="failureStats"></p>
        <div id="failureButtons">
          <button id="tryAgainButton">Try Again</button>
          <button id="failureMenuButton">Menu</button>
        </div>
      </div>
    </div>

    <!-- Success Overlay -->
    <div id="successOverlay">
      <div id="successContainer">
        <h1>Success!</h1>
        <p id="successStats"></p>
        <button id="successOkButton">OK</button>
      </div>
    </div>

    <button id="runButton">Run Code</button>
    <button id="menuButton">Menu</button>
    <button id="tutorialButton">📖</button>
    <button id="saveButton">Save Blocks</button>
    <button id="loadButton">Load Blocks</button>
    <div id="timeWarpControls">
      <button id="warp1x" class="warpButton active">1x</button>
      <button id="warp2x" class="warpButton">2x</button>
      <button id="warp5x" class="warpButton">5x</button>
      <button id="warp10x" class="warpButton">10x</button>
    </div>
    <input type="file" id="fileInput" accept=".json" style="display: none;">
    <div id="blocklyDiv"></div>
    <div id="hResizer"></div>
    <div id="rightPanel">
      <div id="gameContainer">
        <canvas id="game" width="1200" height="800"></canvas>
      </div>
      <div id="vResizer"></div>
      <div id="consoleContainer">
        <div id="consoleHeader">
          Console Output
          <button id="clearConsole">Clear</button>
        </div>
        <div id="consoleContent"></div>
      </div>
    </div>

    <!-- Load libraries -->
    <script src="https://unpkg.com/blockly@10.4.3/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly@10.4.3/python_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

    <!-- Load our logic -->
    <script src="blocks.js?v=18"></script>
    <script src="main.js?v=54"></script>
  </body>
</html>
